{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}apex ERP{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .auth-form input {
            width: 100%;
            background: white;
            border: 1px solid #e5e7eb;
            color: #2d3748;
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }
        .auth-form input:focus {
            outline: none;
            border-color: #0891b2;
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }
        .auth-form input[type="password"],
        .auth-form input[type="text"] {
            padding-right: 44px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="antialiased min-h-screen bg-gradient-to-br from-blue-50 to-cyan-50 flex items-center justify-center px-4 py-16">

    <div class="w-full max-w-md fade-in-up">

        <!-- Brand -->
        <div class="text-center mb-8">
            <a href="/">
                <span class="text-3xl font-800"><span class="accent-cyan">apex</span><span class="text-gray-900">ERP</span></span>
            </a>
            <p class="text-gray-500 text-sm mt-2">{% block subtitle %}{% endblock %}</p>
        </div>

        <!-- Card -->
        <div class="glass rounded-2xl p-8">
            <h2 class="text-gray-900 text-xl font-700 mb-6">{% block card_title %}{% endblock %}</h2>
            {% block content %}{% endblock %}
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">
            <a href="/" class="hover:text-cyan-700 transition">← Back to Home</a>
        </p>

    </div>

    {% block extra_js %}{% endblock %}
    <script>
        function togglePassword(fieldId, btn) {
            const input = document.getElementById(fieldId);
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            btn.querySelector('svg').innerHTML = isHidden
                ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
        }
    </script>
</body>
</html>
